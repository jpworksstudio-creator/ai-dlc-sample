<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCR-1 ホーム - ワイヤーフレーム</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; max-width: 480px; margin-inline: auto; background: #f5f5f5; }
    .wf { border: 2px dashed #999; background: #fff; margin: 8px; padding: 12px; }
    .wf-label { font-size: 11px; color: #666; margin-bottom: 4px; }
    header, footer { border: 1px solid #ccc; padding: 12px; text-align: center; }
    .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #333; background: #eee; }
    .btn-primary { background: #ddd; font-weight: bold; }
    .state-note { font-size: 12px; color: #c00; border-left: 3px solid #c00; padding-left: 8px; margin: 8px 0; }
    nav { display: flex; justify-content: space-around; font-size: 12px; }
    nav a { color: #333; }
  </style>
</head>
<body>
  <p class="state-note">[WF] SCR-1 ホーム | ストーリー: S-1, S-2, S-3 | Mobile 320px+</p>

  <header class="wf">
    <div class="wf-label">ヘッダー</div>
    <strong>家計 AI エージェント</strong>
  </header>

  <main>
    <!-- Success 状態 -->
    <section class="wf" aria-label="データ状態（Success）">
      <div class="wf-label">状態サマリー [Success]</div>
      <p>取引データ: <strong>142件</strong></p>
      <p>最終取り込み: <strong>2026-05-31</strong></p>
    </section>

    <!-- Empty 状態（コメント） -->
    <section class="wf" aria-label="データ状態（Empty）" style="opacity:0.6">
      <div class="wf-label">状態サマリー [Empty] ※データ未取り込み時</div>
      <p>家計データがありません。まずデータを取り込んでください。</p>
    </section>

    <section class="wf">
      <div class="wf-label">プライマリ CTA</div>
      <button type="button" class="btn btn-primary" aria-label="データを取り込む">データを取り込む → SCR-2</button>
      <button type="button" class="btn" aria-label="AI に相談する">AI に相談する → SCR-3</button>
    </section>

    <section class="wf">
      <div class="wf-label">クイック質問例</div>
      <p>「先月の食費はいくら？」</p>
      <p>「無駄な支出はどこ？」</p>
    </section>
  </main>

  <footer class="wf">
    <div class="wf-label">フッターナビ</div>
    <nav aria-label="メインナビゲーション">
      <a href="home.html">ホーム</a>
      <a href="import.html">取り込み</a>
      <a href="chat.html">相談</a>
      <a href="settings.html">設定</a>
    </nav>
  </footer>
</body>
</html>
