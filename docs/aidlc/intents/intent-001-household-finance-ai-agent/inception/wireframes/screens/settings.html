<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCR-4 設定 - ワイヤーフレーム</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; max-width: 480px; margin-inline: auto; background: #f5f5f5; }
    .wf { border: 2px dashed #999; background: #fff; margin: 8px; padding: 12px; }
    .wf-label { font-size: 11px; color: #666; margin-bottom: 4px; }
    header { border: 1px solid #ccc; padding: 12px; display: flex; align-items: center; gap: 8px; }
    .btn-danger { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #c00; background: #fee; color: #c00; font-weight: bold; }
    .state-note { font-size: 12px; color: #c00; border-left: 3px solid #c00; padding-left: 8px; margin: 8px; }
    .dialog { border: 2px solid #333; padding: 16px; background: #fff; }
  </style>
</head>
<body>
  <p class="state-note">[WF] SCR-4 設定 | ストーリー: S-8</p>

  <header class="wf">
    <a href="home.html" aria-label="戻る">←</a>
    <strong>設定</strong>
  </header>

  <main>
    <section class="wf">
      <div class="wf-label">データ保存の説明</div>
      <p>家計データはこの端末のブラウザ内にのみ保存されます。サーバーには送信しません。</p>
      <p>保存件数: <strong>142件</strong></p>
    </section>

    <section class="wf">
      <div class="wf-label">破壊的操作</div>
      <button type="button" class="btn-danger" aria-label="家計データをすべて削除">家計データを削除</button>
    </section>

    <section class="wf dialog" role="alertdialog" aria-label="削除確認">
      <div class="wf-label">[確認ダイアログ] Destructive action</div>
      <p><strong>すべての家計データを削除しますか？</strong></p>
      <p>この操作は取り消せません。</p>
      <button type="button" class="btn-danger">削除する</button>
      <button type="button" style="padding:12px; margin-top:8px; width:100%">キャンセル</button>
    </section>

    <section class="wf" aria-label="Success 状態">
      <div class="wf-label">[Success]</div>
      <p>家計データを削除しました。</p>
      <a href="home.html">ホームへ戻る</a>
    </section>
  </main>
</body>
</html>
