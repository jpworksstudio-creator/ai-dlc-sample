<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCR-3 AI チャット - ワイヤーフレーム</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; max-width: 480px; margin-inline: auto; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; }
    .wf { border: 2px dashed #999; background: #fff; margin: 8px; padding: 12px; }
    .wf-label { font-size: 11px; color: #666; margin-bottom: 4px; }
    header { border: 1px solid #ccc; padding: 12px; display: flex; align-items: center; gap: 8px; }
    .chat-area { flex: 1; overflow-y: auto; }
    .msg-user { background: #e8e8e8; padding: 8px; margin: 8px 0; border-radius: 4px; text-align: right; }
    .msg-ai { background: #f0f0f0; padding: 8px; margin: 8px 0; border: 1px solid #ccc; }
    .chip { display: inline-block; padding: 6px 10px; margin: 4px; border: 1px solid #999; font-size: 13px; }
    .input-area { border-top: 2px solid #333; padding: 8px; background: #fff; }
    .btn { padding: 12px 16px; border: 2px solid #333; background: #eee; }
    .state-note { font-size: 12px; color: #c00; border-left: 3px solid #c00; padding-left: 8px; margin: 8px; }
    label { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <p class="state-note">[WF] SCR-3 AI チャット | ストーリー: S-3〜S-7</p>

  <header class="wf">
    <a href="home.html" aria-label="戻る">←</a>
    <strong>AI に相談</strong>
  </header>

  <div class="chat-area">
    <section class="wf" aria-label="会話履歴">
      <div class="msg-user">
        <div class="wf-label">ユーザー</div>
        先月の食費はいくら？
      </div>
      <div class="msg-ai">
        <div class="wf-label">AI 応答 [Success]</div>
        <p><strong>食費: ¥82,400</strong>（補正後）</p>
        <p><strong>明細:</strong> スーパー○○ ¥3,200 等</p>
        <p><strong>改善案:</strong> 外食が前月比+15%です。週1回の自炊を試してみては？</p>
        <p><strong>良かった点:</strong> 固定費は予算内に収まっています。</p>
      </div>
    </section>

    <section class="wf" aria-label="Loading 状態">
      <div class="wf-label">[Loading] 応答待ち（30秒以内）</div>
      <p>考え中…</p>
    </section>

    <section class="wf" aria-label="Error 状態">
      <div class="wf-label">[Error]</div>
      <p role="alert">応答を取得できませんでした。もう一度お試しください。</p>
    </section>

    <section class="wf" aria-label="サンプル質問">
      <div class="wf-label">サンプル質問チップ</div>
      <button type="button" class="chip">先月の総支出は？</button>
      <button type="button" class="chip">無駄な支出はどこ？</button>
      <button type="button" class="chip">この取引は何？</button>
    </section>
  </div>

  <div class="input-area">
    <label for="question">質問を入力</label>
    <textarea id="question" rows="2" style="width:100%" placeholder="家計について質問…"></textarea>
    <button type="button" class="btn" aria-label="質問を送信" style="width:100%; margin-top:8px">送信</button>
  </div>
</body>
</html>
